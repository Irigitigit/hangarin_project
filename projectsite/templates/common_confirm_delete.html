{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center py-8">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
      <div class="p-8 text-center">

        <!-- Danger icon -->
        <div class="w-16 h-16 rounded-full bg-red-50 dark:bg-red-900/20 flex items-center justify-center mx-auto mb-5">
          <i class="fas fa-trash-alt text-red-500 dark:text-red-400 text-2xl"></i>
        </div>

        <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-3 uppercase tracking-wide">Confirm Deletion</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 mb-2">
          Are you sure you want to delete <strong class="text-slate-700 dark:text-slate-200">"{{ object }}"</strong>?
        </p>
        <p class="text-xs font-semibold text-red-500 dark:text-red-400 mb-7">
          This action is permanent and cannot be recovered.
        </p>

        <form method="POST">
          {% csrf_token %}
          <button type="submit"
                  class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-red-500 hover:bg-red-600 text-white text-sm font-bold transition-colors shadow-sm w-full justify-center mb-3">
            <i class="fas fa-trash-alt"></i>
            Yes, Delete Permanently
          </button>
        </form>

        <a href="javascript:history.back()"
           class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors">
          <i class="fas fa-arrow-left text-xs"></i>
          No, take me back
        </a>

      </div>
    </div>
  </div>
</div>
{% endblock %}
