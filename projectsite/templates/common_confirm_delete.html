{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card bg-secondary shadow border-0 mt-5">
            <div class="card-body px-lg-5 py-lg-5 text-center">
                <div class="icon icon-shape bg-gradient-danger text-white rounded-circle shadow mb-4">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                
                <h2 class="text-uppercase ls-1 mb-3">Confirm Deletion</h2>
                
                <p class="text-muted mb-4">
                    Are you sure you want to delete <strong>"{{ object }}"</strong>? <br>
                    <span class="text-danger font-weight-600">This action is permanent and cannot be recovered.</span>
                </p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="text-center">
                        <button type="submit" class="btn btn-danger my-4 px-5 shadow">
                            <i class="fas fa-trash-alt mr-2"></i> Yes, Delete Permanently
                        </button>
                        
                        <div class="mt-2">
                            <a href="javascript:history.back()" class="btn btn-link text-muted">
                                <i class="fas fa-arrow-left mr-1"></i> No, take me back
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Smooth transition for the card appearing */
    .card {
        animation: fadeInDown 0.4s ease-out;
    }

    @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Dark Mode Compatibility */
    .dark-mode .card {
        background-color: #262161 !important;
        border: 1px solid #32325d !important;
    }
    .dark-mode .text-muted {
        color: #adb5bd !important;
    }
    .dark-mode h2 {
        color: #ffffff;
    }
</style>
{% endblock %}
