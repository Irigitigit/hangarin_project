{% extends 'base.html' %}
{%load static %}
{% block content %}
    <h2>My Tasks</h2>
    <ul class="list-group">
        {% for task in tasks %}
            <li class="list-group-item">
                <a href="{% url 'task_detail' task.pk %}">{{ task.title }}</a> 
                - {{ task.status }}
            </li>
        {% empty %}
            <p>No tasks yet! <a href="{% url 'task_create' %}">Create one</a>.</p>
        {% endfor %}
    </ul>
{% endblock %}
