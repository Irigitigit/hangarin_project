{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center">
  <div class="w-full max-w-2xl">
    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-6">
      <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-4">My Tasks</h2>
      <ul class="divide-y divide-slate-100 dark:divide-slate-700">
        {% for task in tasks %}
        <li class="py-3 flex items-center justify-between">
          <a href="{% url 'task_detail' task.pk %}"
             class="text-sm font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">{{ task.title }}</a>
          <span class="text-xs text-slate-400 dark:text-slate-500">{{ task.status }}</span>
        </li>
        {% empty %}
        <li class="py-10 text-center text-sm text-slate-400 dark:text-slate-500">
          No tasks yet.
          <a href="{% url 'task_add' %}" class="text-indigo-600 dark:text-indigo-400 hover:underline ml-1">Create one</a>.
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endblock %}
