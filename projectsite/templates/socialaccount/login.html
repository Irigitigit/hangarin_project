{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirm Sign In — Hangarin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'js/plugins/@fortawesome/fontawesome-free/css/all.min.css' %}" rel="stylesheet" />
  <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark');}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] } } }
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-600 to-purple-600 dark:from-slate-900 dark:to-slate-800 flex items-center justify-center p-4 font-sans antialiased">

<div class="w-full max-w-md">
  <div class="text-center mb-7">
    <h1 class="text-2xl font-bold tracking-[4px] text-white">HANGARIN</h1>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-white/10 p-8 text-center">
    <div class="w-14 h-14 rounded-full bg-indigo-50 dark:bg-indigo-900/20 flex items-center justify-center mx-auto mb-5">
      <i class="fas fa-sign-in-alt text-indigo-500 dark:text-indigo-400 text-xl"></i>
    </div>

    <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-2">Confirm Sign In</h3>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-7">
      You are about to sign in using your <strong class="text-slate-700 dark:text-slate-200">{{ provider.name }}</strong> account.
    </p>

    <form method="post">
      {% csrf_token %}
      <button type="submit"
              class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white text-sm font-bold tracking-wide transition-all shadow-md mb-3">
        Continue with {{ provider.name }}
      </button>
    </form>

    <a href="{% url 'account_login' %}"
       class="block w-full py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 text-sm font-semibold transition-colors">
      Cancel
    </a>
  </div>
</div>

</body>
</html>
