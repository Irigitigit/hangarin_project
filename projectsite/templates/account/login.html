{% load socialaccount %}
{% load static %}
<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hangarin | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'js/plugins/@fortawesome/fontawesome-free/css/all.min.css' %}" rel="stylesheet" />
  <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark');}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-600 to-purple-600 dark:from-slate-900 dark:to-slate-800 flex items-center justify-center p-4 font-sans antialiased">

<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-7">
    <h1 class="text-3xl font-bold tracking-[4px] text-white">HANGARIN</h1>
    <p class="text-indigo-200 dark:text-slate-400 text-sm mt-1">Task Management System</p>
  </div>

  <!-- Django messages (e.g. sign-out confirmation) -->
  {% if messages %}
    {% for message in messages %}
    <div x-data="{ visible: true }"
         x-show="visible"
         x-transition:leave="transition ease-in duration-700"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-3"
         x-init="setTimeout(() => visible = false, 6000)"
         class="mb-5 flex items-center gap-3 px-4 py-3 rounded-xl bg-white/15 border border-white/30 text-white text-sm backdrop-blur-sm">
      <i class="fas fa-check-circle flex-shrink-0 text-green-300"></i>
      <span>{{ message }}</span>
    </div>
    {% endfor %}
  {% endif %}

  <!-- Card with tab switcher -->
  <div x-data="{ tab: 'login' }" class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-white/10 overflow-hidden">

    <!-- Tabs -->
    <div class="flex border-b border-slate-200 dark:border-slate-700">
      <button @click="tab = 'login'"
              :class="tab === 'login' ? 'bg-indigo-600 text-white' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'"
              class="flex-1 py-3.5 text-sm font-bold tracking-wide transition-colors">
        Login
      </button>
      <button @click="tab = 'register'"
              :class="tab === 'register' ? 'bg-indigo-600 text-white' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'"
              class="flex-1 py-3.5 text-sm font-bold tracking-wide transition-colors">
        Register
      </button>
    </div>

    <!-- Login tab -->
    <div x-show="tab === 'login'" class="p-7">
      <!-- OAuth buttons -->
      <div class="text-center mb-5">
        <p class="text-xs text-slate-400 dark:text-slate-500 mb-3">Sign in with:</p>
        <div class="flex justify-center gap-3">
          <a href="{% provider_login_url 'google' %}"
             class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 text-sm font-semibold transition-colors shadow-sm">
            <i class="fab fa-google text-red-500"></i> Google
          </a>
          <a href="{% provider_login_url 'github' %}"
             class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 text-sm font-semibold transition-colors shadow-sm">
            <i class="fab fa-github"></i> GitHub
          </a>
        </div>
      </div>

      <div class="flex items-center gap-3 mb-5">
        <hr class="flex-1 border-slate-200 dark:border-slate-700">
        <span class="text-xs text-slate-400 dark:text-slate-500 font-medium">OR</span>
        <hr class="flex-1 border-slate-200 dark:border-slate-700">
      </div>

      <form method="post" action="{% url 'account_login' %}" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="id_login">Email or Username</label>
          <input type="text" name="login" id="id_login" required
                 class="block w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2.5 text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="id_password">Password</label>
          <input type="password" name="password" id="id_password" required
                 class="block w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2.5 text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400 cursor-pointer">
            <input type="checkbox" name="remember" id="loginCheck" checked
                   class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            Remember me
          </label>
          <a href="{% url 'account_reset_password' %}" class="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">Forgot?</a>
        </div>
        <button type="submit"
                class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white text-sm font-bold tracking-wide transition-all shadow-md">
          Sign in
        </button>
      </form>
    </div>

    <!-- Register tab -->
    <div x-show="tab === 'register'" style="display:none;" class="p-7">
      <div class="text-center mb-5">
        <p class="text-xs text-slate-400 dark:text-slate-500 mb-3">Quick register with:</p>
        <div class="flex justify-center gap-3">
          <a href="{% provider_login_url 'google' %}"
             class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 text-sm font-semibold transition-colors shadow-sm">
            <i class="fab fa-google text-red-500"></i> Google
          </a>
          <a href="{% provider_login_url 'github' %}"
             class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 text-sm font-semibold transition-colors shadow-sm">
            <i class="fab fa-github"></i> GitHub
          </a>
        </div>
      </div>

      <div class="flex items-center gap-3 mb-5">
        <hr class="flex-1 border-slate-200 dark:border-slate-700">
        <span class="text-xs text-slate-400 dark:text-slate-500 font-medium">OR</span>
        <hr class="flex-1 border-slate-200 dark:border-slate-700">
      </div>

      <form method="post" action="{% url 'account_signup' %}" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="registerUsername">Username</label>
          <input type="text" name="username" id="registerUsername" required
                 class="block w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2.5 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="registerEmail">Email</label>
          <input type="email" name="email" id="registerEmail" required
                 class="block w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2.5 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="registerPassword">Password</label>
          <input type="password" name="password1" id="registerPassword" required
                 class="block w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2.5 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="registerRepeatPassword">Confirm Password</label>
          <input type="password" name="password2" id="registerRepeatPassword" required
                 class="block w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2.5 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        <button type="submit"
                class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white text-sm font-bold tracking-wide transition-all shadow-md">
          Create Account
        </button>
      </form>
    </div>

  </div>
</div>

</body>
</html>
