{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Hangarin Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet">
    <link href="{% static 'js/plugins/nucleo/css/nucleo.css' %}" rel="stylesheet" />
    <link href="{% static 'js/plugins/@fortawesome/fontawesome-free/css/all.min.css' %}" rel="stylesheet" />
    <link href="{% static 'css/argon-dashboard.css' %}" rel="stylesheet" />
    
    <style>
        :root { --transition-speed: 0.3s; }

        /* --- Dark Mode Fixes --- */
        body.dark-mode { background-color: #10102b !important; color: #e9ecef; }
        
        .dark-mode .navbar-vertical { background-color: #171738 !important; border-color: #2e2e5d !important; }
        .dark-mode .navbar-vertical .nav-link:not(.active) { color: #adb5bd !important; }
        
        .dark-mode .card, .dark-mode .thead-light th { 
            background-color: #1c1c44 !important; 
            color: #ffffff !important; 
            border-color: #2e2e5d !important; 
        }
        .dark-mode .table td { color: #cbd5e0 !important; border-top: 1px solid #2e2e5d; }
        .dark-mode .text-muted { color: #8898aa !important; }
        .dark-mode .main-content .header { background: linear-gradient(87deg, #172b4d 0, #1a174d 100%) !important; }

        /* --- Sidebar Active States --- */
        .nav-item .nav-link { transition: all var(--transition-speed); border-radius: 8px; margin: 0 10px; }
        .nav-item .nav-link.active {
            background: linear-gradient(87deg, #5e72e4 0, #825ee4 100%) !important;
            color: white !important;
            box-shadow: 0 4px 20px 0 rgba(0,0,0,.14), 0 7px 10px -5px rgba(94,114,228,.4);
        }
        .nav-item .nav-link.active i { color: white !important; }
    </style>
</head>

<body>
    <nav class="navbar navbar-vertical fixed-left navbar-expand-md navbar-light bg-white" id="sidenav-main">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#sidenav-collapse-main">
                <span class="navbar-toggler-icon"></span>
            </button>

            <a class="navbar-brand pt-0" href="{% url 'home' %}">
                <h2 class="text-primary font-weight-bold" style="letter-spacing: 2px;">HANGARIN</h2>
            </a>

            <div class="collapse navbar-collapse" id="sidenav-collapse-main">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">
                            <i class="ni ni-chart-bar-32 text-primary"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if 'task' in request.path %}active{% endif %}" href="{% url 'task_list' %}">
                            <i class="ni ni-check-bold text-green"></i> Tasks
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}" href="{% url 'about' %}">
                            <i class="ni ni-collection text-info"></i> About
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if 'note' in request.path %}active{% endif %}" href="{% url 'note_list' %}">
                            <i class="ni ni-paper-diploma text-yellow"></i> Notes
                        </a>
                    </li>
                </ul>
                
                <hr class="my-3">
                <h6 class="navbar-heading text-muted">Configuration</h6>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="{% url 'priority_list' %}"><i class="ni ni-bullet-list-67 text-red"></i> Priorities</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'category_list' %}"><i class="ni ni-tag text-blue"></i> Categories</a></li>
                </ul>

                <hr class="my-3">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="javascript:void(0)" id="dark-mode-toggle">
                            <i class="ni ni-palette text-darker"></i> <span>Change Theme</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="header bg-gradient-primary pb-8 pt-5 pt-md-8">
            <div class="container-fluid">
                {% block header %}{% endblock %}
            </div>
        </div>
        <div class="container-fluid mt--7">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="{% static 'js/plugins/jquery/dist/jquery.min.js' %}"></script>
    <script src="{% static 'js/plugins/bootstrap/dist/js/bootstrap.bundle.min.js' %}"></script>
    
    <script>
        // Theme Persistence Logic
        const toggle = document.getElementById('dark-mode-toggle');
        const body = document.body;

        // Apply theme on load
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
        }

        toggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const theme = body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
        });
    </script>
</body>
</html>
