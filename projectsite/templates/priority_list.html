{% extends 'base.html' %}

{% block content %}
<div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">

  <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
    <h3 class="text-base font-bold text-slate-800 dark:text-slate-100">Priority Levels</h3>
    <a href="{% url 'priority_add' %}"
       class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold transition-colors shadow-sm">
      <i class="fas fa-plus"></i> Add Priority
    </a>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full">
      <thead>
        <tr class="border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
          <th class="text-left px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Priority Name</th>
          <th class="text-right px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100 dark:divide-slate-700">
        {% for item in items %}
        <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/20 transition-colors">
          <td class="px-5 py-3.5">
            <div class="flex items-center gap-3">
              <span class="w-7 h-7 rounded-lg bg-red-50 dark:bg-red-900/20 flex items-center justify-center flex-shrink-0">
                <i class="ni ni-bullet-list-67 text-red-500 dark:text-red-400 text-xs"></i>
              </span>
              <span class="text-sm font-semibold text-slate-800 dark:text-slate-100">{{ item.name }}</span>
            </div>
          </td>
          <td class="px-5 py-3.5 text-right">
            <div class="flex items-center justify-end gap-1.5">
              <a href="{% url 'priority_edit' item.pk %}"
                 class="p-1.5 rounded-lg text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-colors" title="Edit">
                <i class="fas fa-edit text-sm"></i>
              </a>
              <a href="{% url 'priority_delete' item.pk %}"
                 class="p-1.5 rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors" title="Delete">
                <i class="fas fa-trash text-sm"></i>
              </a>
            </div>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="2" class="text-center py-16">
            <i class="ni ni-active-40 text-slate-300 dark:text-slate-600 text-4xl block mb-3"></i>
            <p class="text-sm font-semibold text-slate-500 dark:text-slate-400 mb-1">No priorities set.</p>
            <p class="text-xs text-slate-400 dark:text-slate-500 mb-4">Define levels like "High", "Medium", or "Low" to organize tasks.</p>
            <a href="{% url 'priority_add' %}" class="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">Create New Priority →</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</div>
{% endblock %}
