{% extends 'base.html' %}

{% block content %} 
<div class="card shadow border-0">
    <div class="card-header border-0 bg-transparent">
        <div class="row align-items-center">
            <div class="col">
                <h3 class="mb-0 text-uppercase ls-1">Subtasks</h3>
            </div>
            <div class="col text-right">
                <a href="{% url 'subtask_add' %}" class="btn btn-sm btn-primary shadow-sm">
                    <i class="fas fa-plus mr-1"></i> Add Subtask
                </a>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table align-items-center table-flush">
            <thead class="thead-light">
                <tr>
                    <th scope="col" class="sort" data-sort="name">Subtask Name</th>
                    <th scope="col" class="text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="list">
                {% for item in items %}
                <tr class="hover-shadow-sm transition-300">
                    <td class="font-weight-600 text-dark">
                        <div class="media align-items-center">
                            <span class="avatar avatar-xs rounded-circle bg-soft-primary mr-3">
                                <i class="ni ni-check-bold text-primary" style="font-size: 0.7rem;"></i>
                            </span>
                            <span class="mb-0 text-sm">{{ item.name }}</span>
                        </div>
                    </td>
                    <td class="text-right">
                        <div class="btn-group">
                            <a href="{% url 'subtask_edit' item.pk %}" class="btn btn-sm btn-outline-primary" title="Edit">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a href="{% url 'subtask_delete' item.pk %}" class="btn btn-sm btn-outline-danger" title="Delete">
                                <i class="fas fa-trash"></i>
                            </a>
                        </div>
                    </td>   
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center py-6 bg-secondary-soft">
                        <div class="empty-state">
                            <i class="ni ni-folder-17 text-muted mb-3" style="font-size: 3rem; display: block;"></i>
                            <h4 class="text-muted font-weight-light">No subtasks found yet.</h4>
                            <a href="{% url 'subtask_add' %}" class="btn btn-link text-primary mt-2">Create your first subtask</a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<style>
    /* Smoothness enhancements */
    .transition-300 { transition: all 0.3s ease; }
    .hover-shadow-sm:hover { 
        background-color: rgba(94, 114, 228, 0.03); 
    }
    .bg-soft-primary { background-color: #e8ebfa; }
    
    /* Dark mode adjustments for this specific table */
    .dark-mode .bg-soft-primary { background-color: #32325d; }
    .dark-mode .text-dark { color: #ffffff !important; }
    .dark-mode .bg-secondary-soft { background-color: #1a174d; }
</style>
{% endblock %}
