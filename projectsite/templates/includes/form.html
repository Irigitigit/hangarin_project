{% load widget_tweaks %}

{% for field in form %}
    <div class="form-group">
        {{ field.label_tag }}
        {% render_field field class="form-control" %}
        {% if field.errors %}
            <div class="text-danger">
                {{ field.errors }}
            </div>
        {% endif %}
    </div>
{% endfor %}

{% if form.non_field_errors %}
    <div class="text-danger">
        {{ form.non_field_errors }}
    </div>
{% endif %}
