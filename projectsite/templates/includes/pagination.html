{% if page_obj.has_other_pages %}
<nav aria-label="Page navigation" class="px-5 py-4 border-t border-slate-200 dark:border-slate-700 flex items-center justify-center gap-1">

  {% if page_obj.has_previous %}
  <a href="{{ request.path }}?{% for key, val in request.GET.items %}{% if key != 'page' %}{{ key }}={{ val }}&{% endif %}{% endfor %}page={{ page_obj.previous_page_number }}"
     class="px-3 py-1.5 rounded-lg text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-800 dark:hover:text-slate-200 transition-colors"
     aria-label="Previous">
    <i class="fas fa-chevron-left text-xs"></i>
  </a>
  {% else %}
  <span class="px-3 py-1.5 rounded-lg text-sm font-semibold text-slate-300 dark:text-slate-600 cursor-not-allowed">
    <i class="fas fa-chevron-left text-xs"></i>
  </span>
  {% endif %}

  {% for num in page_obj.paginator.page_range %}
  {% if page_obj.number == num %}
  <span class="px-3.5 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white shadow-sm">{{ num }}</span>
  {% else %}
  <a href="{{ request.path }}?{% for key, val in request.GET.items %}{% if key != 'page' %}{{ key }}={{ val }}&{% endif %}{% endfor %}page={{ num }}"
     class="px-3.5 py-1.5 rounded-lg text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-800 dark:hover:text-slate-200 transition-colors">
    {{ num }}
  </a>
  {% endif %}
  {% endfor %}

  {% if page_obj.has_next %}
  <a href="{{ request.path }}?{% for key, val in request.GET.items %}{% if key != 'page' %}{{ key }}={{ val }}&{% endif %}{% endfor %}page={{ page_obj.next_page_number }}"
     class="px-3 py-1.5 rounded-lg text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-800 dark:hover:text-slate-200 transition-colors"
     aria-label="Next">
    <i class="fas fa-chevron-right text-xs"></i>
  </a>
  {% else %}
  <span class="px-3 py-1.5 rounded-lg text-sm font-semibold text-slate-300 dark:text-slate-600 cursor-not-allowed">
    <i class="fas fa-chevron-right text-xs"></i>
  </span>
  {% endif %}

</nav>
{% endif %}
